<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rakesh Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    background: #fff8f0;
}

.header {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1200&q=80');
    background-size: cover;
    background-position: center;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

h1 {
    font-family: 'Great Vibes';
    font-size: 3rem;
}

.section {
    padding: 40px 15px;
}

.btn {
    padding: 12px 25px;
    background: #d4af37;
    color: white;
    border-radius: 30px;
    text-decoration: none;
    display: inline-block;
    margin: 10px;
}

.countdown {
    font-size: 1.4rem;
    color: #d4af37;
    margin: 20px;
}

.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.gallery img {
    width: 90%;
    max-width: 280px;
    margin: 10px;
    border-radius: 12px;
}

form input, form textarea {
    width: 90%;
    max-width: 350px;
    padding: 10px;
    margin: 8px;
}

iframe {
    width: 95%;
    height: 250px;
    border-radius: 12px;
    border: none;
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio controls loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<!-- HEADER -->
<div class="header">
    <h1>Rakesh & Pratibha</h1>
    <p>We are getting married ❤️</p>
</div>

<!-- COUNTDOWN -->
<div class="section">
    <h2>Save The Date</h2>
    <div id="countdown" class="countdown"></div>
</div>

<!-- GALLERY -->
<div class="section gallery">
    <h2>Our Memories 📸</h2>

    <img loading="lazy" src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486?auto=format&fit=crop&w=800&q=80">
    <img loading="lazy" src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=800&q=80">
    <img loading="lazy" src="https://images.unsplash.com/photo-1529634899988-2f8a1d6fef3e?auto=format&fit=crop&w=800&q=80">
</div>

<!-- LOCATIONS -->
<div class="section">
    <h2>Wedding Events 📍</h2>

    <h3>🎉 Tilak Ceremony</h3>
    <a class="btn" href="https://maps.app.goo.gl/wwFNXBdN77ndbRaC6" target="_blank">
        📍 Open Tilak Location
    </a>

    <h3>💍 Wedding Ceremony</h3>
    <a class="btn" href="https://maps.app.goo.gl/M2jL9vCGrt9k6p8z5" target="_blank">
        📍 Open Wedding Location
    </a>
</div>

<!-- RSVP -->
<div class="section">
    <h2>RSVP 💌</h2>
    <form onsubmit="submitForm(event)">
        <input type="text" placeholder="Your Name" required><br>
        <input type="number" placeholder="Guests Count"><br>
        <textarea placeholder="Message"></textarea><br>
        <button class="btn">Submit</button>
    </form>
</div>

<!-- BUTTONS -->
<div class="section">
    <a class="btn" href="https://wa.me/?text=You're invited to Rakesh's Wedding 🎉">📲 WhatsApp</a>
</div>

<footer>
    Made with ❤️ by Rakesh
</footer>

<script>
// COUNTDOWN
const date = new Date("Dec 25, 2026").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const gap = date - now;

    const days = Math.floor(gap / (1000*60*60*24));

    document.getElementById("countdown").innerHTML =
        days + " Days Left 🎉";
}, 1000);

// RSVP
function submitForm(e) {
    e.preventDefault();
    alert("Thank you! ❤️");
}
</script>

</body>
</html>
