<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakesh & Pratibha Wedding</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37;
            --dark-overlay: rgba(0, 0, 0, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            background: #fffaf5;
            color: #333;
            overflow-x: hidden;
        }

        /* FIRST CODE IMAGE CONFIGURATION - FIXED */
        .header {
            width: 100%;
            height: 100vh; /* Laptop screen ke barabar */
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .header img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Photo kategi nahi, poori dikhegi */
            z-index: 1;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark-overlay);
            z-index: 2;
        }

        .header-content {
            position: absolute;
            z-index: 3;
            color: white;
            width: 90%;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin: 0;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
        }

        .header-content p {
            font-size: clamp(1rem, 4vw, 1.5rem);
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.8);
            margin-top: 10px;
        }

        /* SECTIONS */
        .section {
            padding: 50px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .countdown-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-top: -40px; 
            position: relative;
            z-index: 10;
        }

        .countdown {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--gold);
        }

        h2 {
            font-family: 'Great Vibes', cursive;
            font-size: 2.8rem;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 25px;
            background: var(--gold);
            color: white;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
            font-weight: 600;
            border: none;
            transition: 0.3s;
            cursor: pointer;
        }

        .btn:hover {
            transform: scale(1.05);
            background: #b8962d;
        }

        /* GALLERY */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .gallery img {
            width: 100%;
            max-width: 300px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        input {
            width: 80%;
            max-width: 300px;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: 'Poppins';
        }

        footer {
            padding: 40px;
            background: #fdf2e9;
            font-size: 0.85rem;
            color: #777;
        }
    </style>
</head>

<body>

    <div class="header">
        <img src="couple.png" alt="Rakesh & Pratibha">
        <div class="overlay"></div>
        <div class="header-content">
            <h1>Rakesh & Pratibha</h1>
            <p>We are getting married 💍</p>
        </div>
    </div>

    <div class="section">
        <div class="countdown-container">
            <h2>Save The Date</h2>
            <div id="countdown" class="countdown">Loading...</div>
            <p>December 25, 2026</p>
        </div>
    </div>

    <div class="section">
        <h2>Our Memories 📸</h2>
        <div class="gallery">
            <img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486?auto=format&fit=crop&w=800&q=80">
            <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=800&q=80">
        </div>
    </div>

    <div class="section">
        <h2>Wedding Events 📍</h2>
        <div style="margin-bottom: 20px;">
            <h3>🎉 Tilak Ceremony</h3>
            <a class="btn" href="YOUR_MAP_LINK_HERE" target="_blank">📍 View Location</a>
        </div>
        <div style="margin-bottom: 20px;">
            <h3>💍 Wedding Ceremony</h3>
            <a class="btn" href="YOUR_MAP_LINK_HERE" target="_blank">📍 View Location</a>
        </div>
    </div>

    <div class="section">
        <h2>RSVP 💌</h2>
        <form onsubmit="submitForm(event)">
            <input type="text" id="name" placeholder="Your Name" required><br>
            <input type="number" id="guests" placeholder="No. of Guests" required><br>
            <button type="submit" class="btn">Submit</button>
        </form>
    </div>

    <div class="section">
        <h2>Scan Invite 📲</h2>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=https://rs66635.github.io/wedding-invite/" style="margin-bottom: 20px;">
        <br>
        <a class="btn" style="background: #25D366;" href="https://wa.me/?text=You're invited to our wedding 🎉 https://rs66635.github.io/wedding-invite/">
            📲 Share on WhatsApp
        </a>
    </div>

    <footer>
        Made with ❤️ by Rakesh <br>
        © 2026 Rakesh & Pratibha
    </footer>

    <script>
        const weddingDate = new Date("Dec 25, 2026 00:00:00").getTime();

        setInterval(() => {
            const now = new Date().getTime();
            const gap = weddingDate - now;

            const days = Math.floor(gap / (1000 * 60 * 60 * 24));
            const hours = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

            if (gap < 0) {
                document.getElementById("countdown").innerHTML = "The Big Day is Here! 🎉";
            } else {
                document.getElementById("countdown").innerHTML = `${days} Days & ${hours} Hours Left`;
            }
        }, 1000);

        function submitForm(e) {
            e.preventDefault();
            alert("Thank you for the RSVP! ❤️");
        }
    </script>

</body>
</html>
