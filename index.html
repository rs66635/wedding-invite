<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakesh & Pratibha Wedding</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37;
            --dark-overlay: rgba(0, 0, 0, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            background: #fffaf5;
            color: #333;
        }

        /* HEADER SECTION - FIXED FOR NO CROP */
        .header {
            width: 100%;
            position: relative;
            background: #000;
            line-height: 0; /* Gaps hatane ke liye */
        }

        .header img {
            width: 100%;
            height: auto; /* Photo ki original shape maintain rakhega */
            display: block;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark-overlay);
            z-index: 2;
        }

        .header-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            color: white;
            width: 90%;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.5rem, 8vw, 4.5rem); /* Responsive font size */
            margin: 0;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
        }

        .header-content p {
            font-size: clamp(1rem, 4vw, 1.5rem);
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.8);
            margin-top: 10px;
        }

        /* CONTENT SECTIONS */
        .section {
            padding: 50px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .countdown-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-top: -30px; 
            position: relative;
            z-index: 10;
        }

        .countdown {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--gold);
        }

        h2 {
            font-family: 'Great Vibes', cursive;
            font-size: 2.5rem;
            color: var(--gold);
        }

        .btn {
            padding: 12px 25px;
            background: var(--gold);
            color: white;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
            font-weight: 600;
            border: none;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            background: #b8962d;
        }

        input {
            width: 80%;
            max-width: 300px;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        footer {
            padding: 30px;
            background: #fdf2e9;
            font-size: 0.85rem;
            color: #777;
        }
    </style>
</head>

<body>

    <div class="header">
        <img src="images/couple.png" alt="Rakesh & Pratibha">
        <div class="overlay"></div>
        <div class="header-content">
            <h1>Rakesh & Pratibha</h1>
            <p>We are getting married 💍</p>
        </div>
    </div>

    <div class="section">
        <div class="countdown-container">
            <h2>Save The Date</h2>
            <div id="countdown" class="countdown">Loading...</div>
            <p>December 25, 2026</p>
        </div>
    </div>

    <div class="section">
        <h2>Wedding Events 📍</h2>
        <div style="margin-bottom: 25px;">
            <h3>🎉 Tilak Ceremony</h3>
            <a class="btn" href="YOUR_GOOGLE_MAPS_LINK_HERE" target="_blank">📍 Open Location</a>
        </div>
        <div style="margin-bottom: 25px;">
            <h3>💍 Wedding Ceremony</h3>
            <a class="btn" href="YOUR_GOOGLE_MAPS_LINK_HERE" target="_blank">📍 Open Location</a>
        </div>
    </div>

    <div class="section">
        <h2>RSVP 💌</h2>
        <form onsubmit="submitForm(event)">
            <input type="text" id="name" placeholder="Your Name" required><br>
            <input type="number" id="guests" placeholder="No. of Guests" required><br>
            <button type="submit" class="btn">Confirm Attendance</button>
        </form>
    </div>

    <footer>
        Made with ❤️ by Rakesh <br>
        © 2026 Rakesh & Pratibha
    </footer>

    <script>
        // COUNTDOWN TIMER
        const weddingDate = new Date("Dec 25, 2026 00:00:00").getTime();

        setInterval(() => {
            const now = new Date().getTime();
            const gap = weddingDate - now;

            const days = Math.floor(gap / (1000 * 60 * 60 * 24));
            const hours = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

            if (gap < 0) {
                document.getElementById("countdown").innerHTML = "The Big Day is Here! 🎉";
            } else {
                document.getElementById("countdown").innerHTML = `${days} Days & ${hours} Hours Left`;
            }
        }, 1000);

        function submitForm(e) {
            e.preventDefault();
            alert("Thank you for the RSVP! ❤️");
        }
    </script>

</body>
</html>
