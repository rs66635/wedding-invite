<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rakesh & Priya Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    background: #fff8f0;
}

/* HEADER - FULL IMAGE NO CROP */
.header {
    height: 100vh;
    position: relative;
    background: black;
    overflow: hidden;
}

/* IMAGE */
.header img {
    width: 100%;
    height: 100%;
    object-fit: contain;   /* 🔥 FULL IMAGE */
}

/* DARK OVERLAY */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
}

/* TEXT */
.header-content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
}

h1 {
    font-family: 'Great Vibes';
    font-size: 3rem;
}

/* SECTION */
.section {
    padding: 40px 15px;
}

.btn {
    padding: 12px 25px;
    background: #d4af37;
    color: white;
    border-radius: 30px;
    text-decoration: none;
    display: inline-block;
    margin: 10px;
}

/* COUNTDOWN */
.countdown {
    font-size: 1.4rem;
    color: #d4af37;
}

/* GALLERY */
.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.gallery img {
    width: 90%;
    max-width: 250px;
    margin: 10px;
    border-radius: 12px;
}

/* MOBILE */
@media (max-width: 768px) {
    h1 {
        font-size: 2.2rem;
    }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

    <img src="couple.png" alt="Couple">

    <div class="overlay"></div>

    <div class="header-content">
        <h1>Rakesh & Pratibha</h1>
        <p>We are getting married 💍</p>
    </div>

</div>

<!-- COUNTDOWN -->
<div class="section">
    <h2>Save The Date</h2>
    <div id="countdown" class="countdown"></div>
</div>

<!-- LOCATIONS -->
<div class="section">
    <h2>Wedding Events 📍</h2>

    <h3>🎉 Tilak Ceremony</h3>
    <a class="btn" href="https://maps.app.goo.gl/wwFNXBdN77ndbRaC6" target="_blank">
        📍 Open Tilak Location
    </a>

    <h3>💍 Wedding Ceremony</h3>
    <a class="btn" href="https://maps.app.goo.gl/a8nfPVgtghrEJ6xr5" target="_blank">
        📍 Open Wedding Location
    </a>
</div>

<!-- RSVP -->
<div class="section">
    <h2>RSVP 💌</h2>

    <form onsubmit="submitForm(event)">
        <input type="text" placeholder="Your Name" required><br>
        <input type="number" placeholder="Guests"><br>
        <button class="btn">Submit</button>
    </form>
</div>

<footer>
    Made with ❤️ by Rakesh
</footer>

<script>
// COUNTDOWN
const date = new Date("Dec 25, 2026").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const gap = date - now;
    const days = Math.floor(gap / (1000*60*60*24));
    document.getElementById("countdown").innerHTML = days + " Days Left 🎉";
}, 1000);

// RSVP
function submitForm(e){
    e.preventDefault();
    alert("Thank you ❤️");
}
</script>

</body>
</html>
