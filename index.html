<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakesh & Pratibha Wedding</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            background: #fffaf5;
            color: #333;
            overflow-x: hidden;
        }

        /* HEADER - FIXED FOR LAPTOP AND MOBILE */
        .header {
            width: 100%;
            height: 100vh; /* Laptop screen ki poori height */
            background: #000; /* Side mein black space agar photo choti ho */
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .header img {
            width: 100%;
            height: 100%;
            /* 🔥 MAGIC LINE: Isse photo kategi nahi aur screen ke andar fit rahegi */
            object-fit: contain; 
            z-index: 1;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3); /* Photo thodi dark dikhegi taaki text dikhe */
            z-index: 2;
        }

        .header-content {
            position: absolute;
            z-index: 3;
            color: white;
            width: 90%;
            text-align: center;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin: 0;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
        }

        .header-content p {
            font-size: clamp(1rem, 4vw, 1.5rem);
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.8);
        }

        /* CONTENT SECTIONS */
        .section {
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .countdown-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-top: -40px; 
            position: relative;
            z-index: 10;
        }

        .countdown {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--gold);
        }

        .btn {
            padding: 12px 25px;
            background: var(--gold);
            color: white;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
            font-weight: 600;
        }

        footer {
            padding: 20px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>

<body>

    <div class="header">
        <img src="couple.png" alt="Rakesh & Pratibha">
        <div class="overlay"></div>
        <div class="header-content">
            <h1>Rakesh & Pratibha</h1>
            <p>We are getting married 💍</p>
        </div>
    </div>

    <div class="section">
        <div class="countdown-container">
            <div id="countdown" class="countdown">Loading...</div>
            <p style="margin:0; color: #666;">December 25, 2026</p>
        </div>
    </div>

    <div class="section">
        <h2 style="font-family:'Great Vibes'; color:var(--gold); font-size:2.5rem;">Events 📍</h2>
        <a class="btn" href="#">🎉 Tilak</a>
        <a class="btn" href="#">💍 Wedding</a>
    </div>

    <footer>
        Made with ❤️ by Rakesh
    </footer>

    <script>
        const weddingDate = new Date("Dec 25, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const gap = weddingDate - now;
            const days = Math.floor(gap / (1000 * 60 * 60 * 24));
            document.getElementById("countdown").innerHTML = days + " Days to go! 🎉";
        }, 1000);
    </script>

</body>
</html>
