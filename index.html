<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rakesh & Pratibha Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root {
    --gold: #d4af37;
    --bg-color: #fffaf5;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    background: var(--bg-color);
    overflow-x: hidden;
}

/* HEADER */
.header {
    height: 100vh;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}

.header::before {
    content: "";
    position: absolute;
    width:100%;
    height:100%;
    background: url('couple.png') center/cover;
    filter: blur(15px) brightness(0.5);
}

.header img {
    height: 90vh;
    z-index: 2;
    border-radius: 10px;
}

.overlay {
    position:absolute;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.3);
}

.header-content {
    position:absolute;
    top:10%;
    color:white;
    z-index:5;
}

h1 {
    font-family: 'Great Vibes';
    font-size: 4rem;
}

/* SECTION */
.section {
    padding:50px 20px;
    max-width:800px;
    margin:auto;
}

h2 {
    font-family: 'Great Vibes';
    color: var(--gold);
}

/* COUNTDOWN */
.countdown {
    font-size:1.8rem;
    color:var(--gold);
}

/* EVENTS */
.event-card {
    background:#fff;
    padding:20px;
    margin:10px;
    border-radius:10px;
}

/* BUTTON */
.btn {
    padding:10px 20px;
    background:var(--gold);
    color:white;
    border-radius:50px;
    text-decoration:none;
}

/* GALLERY */
.gallery {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.gallery img {
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
}

.gallery img:hover {
    transform:scale(1.05);
}

/* MODAL */
.modal {
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    top:0;
}

.modal-content {
    margin:auto;
    display:block;
    max-width:90%;
    max-height:80vh;
    margin-top:60px;
}

.close, .prev, .next {
    position:absolute;
    color:white;
    font-size:40px;
    cursor:pointer;
}

.close {top:20px; right:40px;}
.prev {top:50%; left:20px;}
.next {top:50%; right:20px;}

/* MUSIC */
.music-btn {
    position:fixed;
    bottom:20px;
    right:20px;
    background:var(--gold);
    color:white;
    border:none;
    border-radius:50%;
    width:50px;
    height:50px;
}

/* HEARTS */
.hearts {
    position:fixed;
    width:100%;
    height:100%;
    pointer-events:none;
}

.heart {
    position:absolute;
    color:#ff4d6d;
    animation:floatUp linear;
}

@keyframes floatUp {
    from {transform:translateY(100vh);}
    to {transform:translateY(-10vh);}
}

footer {
    padding:40px;
}
</style>
</head>

<body>

<div class="hearts"></div>

<div class="header">
    <img src="couple.png">
    <div class="overlay"></div>
    <div class="header-content">
        <h1>Rakesh & Pratibha</h1>
        <p>We are getting married 💍</p>
    </div>
</div>

<div class="section">
    <h2>Save The Date</h2>
    <div id="countdown" class="countdown"></div>
</div>

    <div class="section">
        <h2>Wedding Events 📍</h2>
        <div class="event-card">
            <span style="color:#777; font-weight:600;">🗓️ Monday, 22 June 2026</span>
            <h3>🎉 Tilak Ceremony</h3>
            <a class="btn" href="https://maps.app.goo.gl/UVbpkx9NRsr6vJAv9" target="_blank">📍 View Location</a>
        </div>

        <div class="event-card">
            <span style="color:#777; font-weight:600;">🗓️ Wednesday, 24 June 2026</span>
            <h3>💍 Wedding Ceremony</h3>
            <a class="btn" href="https://maps.app.goo.gl/52qEkTLHkg6JxRVa8" target="_blank">📍 View Location</a>
        </div>
    </div>

<div class="section">
    <h2>Our Memories 📸</h2>
    <div class="gallery">
        <img src="photo1.jpeg" onclick="openModal(0)">
        <img src="photo2.jpeg" onclick="openModal(1)">
        <img src="photo3.jpeg" onclick="openModal(2)">
        <img src="photo4.jpeg" onclick="openModal(3)">
        <img src="photo5.jpeg" onclick="openModal(4)">
        <img src="photo6.jpeg" onclick="openModal(5)">
    </div>
</div>
 <div class="section">
        <h2>Scan Invite 📲</h2>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=https://rs66635.github.io/wedding-invite/" style="margin-bottom: 20px; border: 10px solid white; border-radius: 10px;">
        <br>
        <a class="btn" style="background: #25D366;" href="https://wa.me/?text=You're invited to our wedding 🎉 https://rs66635.github.io/wedding-invite/">
            📲 Share on WhatsApp
        </a>
    </div>
<div id="imageModal" class="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    <span class="prev" onclick="changeSlide(-1)">❮</span>
    <img class="modal-content" id="modalImg">
    <span class="next" onclick="changeSlide(1)">❯</span>
</div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>
<button class="music-btn" onclick="toggleMusic()">🎶</button>

<footer>Made with ❤️ by Rakesh</footer>

<script>
// countdown
const weddingDate = new Date("June 24, 2026").getTime();
setInterval(()=>{
    const now = new Date().getTime();
    const gap = weddingDate-now;
    const d = Math.floor(gap/(1000*60*60*24));
    document.getElementById("countdown").innerHTML = d+" Days Left";
},1000);

// gallery
let currentIndex=0;
const images=["photo1.jpeg","photo2.jpeg","photo3.jpeg","photo4.jpeg","photo5.jpeg","photo6.jpeg"];

function openModal(i){
    currentIndex=i;
    document.getElementById("imageModal").style.display="block";
    showImage();
}
function showImage(){
    document.getElementById("modalImg").src=images[currentIndex];
}
function closeModal(){
    document.getElementById("imageModal").style.display="none";
}
function changeSlide(step){
    currentIndex=(currentIndex+step+images.length)%images.length;
    showImage();
}

// music
const music=document.getElementById("bgMusic");
window.onload=()=>{music.play().catch(()=>{});}
function toggleMusic(){
    music.paused?music.play():music.pause();
}

// hearts
setInterval(()=>{
    const h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤";
    h.style.left=Math.random()*100+"vw";
    h.style.animationDuration=(3+Math.random()*3)+"s";
    document.querySelector(".hearts").appendChild(h);
    setTimeout(()=>h.remove(),6000);
},500);
</script>

</body>
</html>
